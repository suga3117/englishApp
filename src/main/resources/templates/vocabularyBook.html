<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layout/layout}">
<head>
	<meta charset="UTF-8">
	<title th:text="#{vocabularyBook}"></title>
</head>
<body>
	<div layout:fragment="content">
		<h1 th:text="#{vocabularyBook}" class="top-title"></h1>
	
		<h3 th:text="${vocabularyBook}" class="errorMessage"></h3>
		<br><br>	
	
		<form method="post" th:action="@{/vocabularyBook}" th:object="${vocabularyBookForm}" class="container">
			<div th:errors="*{name}" class="text-danger"></div>
			<div th:errors="*{description}" class="text-danger"></div>
			<h4>●単語帳名●</h4>
			<input type="text" th:field="*{name}" class="form" th:placeholder="#{enterVocabularyBookName}">
			<br><br>
			<h4>●詳細●</h4>
			<input type="text" th:field="*{description}" class="form" th:placeholder="#{enterDetail}">
			<br><br>
			<input type="submit" value="追加" class="btn btn-primary" >
		</form><br><br>
		
		<a th:href="@{/english}" th:text="#{toTopPage}"></a>
		<br>
		<img class="photo" src="/images/english_writing.png" alt="english_writing">
	</div>
</body>
</html>
