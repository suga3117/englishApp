<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layout/layout}">
<head>
	<meta charset="UTF-8">
	<title th:text="#{flashCard}"></title>
</head>
<body>
	<div layout:fragment="content">
		<h1 th:text="#{flashCard}" class="text-info"></h1>
	
		<br><br>	
	
		<form method="post" th:action="@{/card}" th:object="${vocabularyForm}" class="text-center">
			<div th:errors="*{word}" class="text-danger"></div>
			
			<h4>●単語帳●</h4>
			<div >
				<select name="bookId" class="form-control w-75" >
					<option value="" selected>単語帳を選択して下さい。</option>
					<option th:each="vocab : ${vocabularyBookList}" th:value="${vocab.id}" th:text="${vocab.name}"></option>
				</select>
				<br><br>
				<input type="submit" value="選択" class="btn btn-primary" >
			</div>
		</form>
		
			
		<br><br>
		<a th:href="@{/english}">トップページに戻る</a>
		<br>
		<img class="photo" src="/images/english_writing.png" alt="english_writing">
	</div>
</body>
</html>
