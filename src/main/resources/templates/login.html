<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layout/layout}">
<head>
	<meta charset="UTF-8">
	<title th:text="#{login}"></title>
</head>
<body>
	<div layout:fragment="content">
		<h1 th:text="#{login}"></h1>
	
		<form method="post" th:action="@{/login}" th:object="${loginUserForm}">
			<h4>●email●</h4>
			<div th:errors="*{email}" class="text-danger"></div>
			<input type="text" th:field="*{email}" class="form-control w-75" placeholder="emailを入力してください。">
			<br>
			
			<h4>●パスワード●</h4>
			<div th:errors="*{password}" class="text-danger"></div>
			<input type="text" th:field="*{password}" class="form-control w-75" placeholder="パスワードを入力してください。">
			<br>
			
			<input type="submit" value="ログイン" class="btn btn-primary" >
			<br><br>
		</form>
		<a th:href="@{/english}">トップページに戻る</a>
		<a sec:authorize="isAnonymous()" th:href="@{/regist}" class="button-spacing">新規登録</a>
	</div>
</body>
</html>
