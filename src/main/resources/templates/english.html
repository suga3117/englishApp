<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layout/layout}">
<head>
	<meta charset="UTF-8">
	<title th:text="#{etan}"></title>
</head>
<body>
	<div layout:fragment="content">
		<h3 th:text="${newMember}" class="errorMessage"></h3>
		<h3 th:text="${logedIn}" class="errorMessage"></h3>
		<!-- ログアウト状態 -->
		<div class="top-buttons">
			<a sec:authorize="isAnonymous()" th:href="@{/login}" th:text="#{login}"></a>&nbsp;&nbsp;
			<a sec:authorize="isAnonymous()" th:href="@{/regist}" class="button-spacing" th:text="#{newRegist}"></a>
		</div>
		<!-- ログイン状態 -->
		<div sec:authorize="isAuthenticated()" class="top-buttons">
			<a th:href="@{/mypage}" th:text="${'welcome! ' + loginUserName + '様'}"> </a>
			<form method="post" th:action="@{/logout}">
				<input type="submit" value="  ログアウト" class="btn btn-link">
			</form>
		</div>
		
		<h1 th:text="#{etan}"></h1>
		
		<br><br>
	
		<div class="top-page">
			<a class="btn btn-primary" th:href="@{/vocabularyBook}">単語帳登録</a>
			<a class="btn btn-primary" th:href="@{/addition}" th:text="#{added}"></a>
			<a class="btn btn-primary" th:href="@{/cardTop}" th:text="#{flashCard}"></a>
			<a class="btn btn-primary" th:href="@{/dictionary}" th:text="#{dictionary}"></a>
			<a class="btn btn-primary" th:href="@{/book}" th:text="#{vocabularyBookForEveryone}"></a>
		</div>
		<br><br>
		<p>※英単語登録とフラッシュカードの機能はログインユーザーのみ利用可能です。</p>
		
		<img class="photo" src="/images/study_english_ondoku.png" alt="english">
	</div>	
</body>
</html>
