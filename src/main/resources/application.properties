spring.application.name=English

spring.messages.basename=messages,ValidationMessages

# DataSource
spring.datasource.url=jdbc:mysql://localhost:3306/English
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=sugahara
spring.sql.init.encoding=UTF-8
spring.sql.init.mode=ALWAYS

# MyBatis
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.type-aliases-package=katachi.spring.exercise.domain

#Log Level
logging.level.katachi.spring.exercise=debug

#API
English.api.url=https://api.dictionaryapi.dev/api/v2/entries/en
Translation.api.url=https://api.deepl.com/v2/translate


# ファイルサイズの合計の最大値
spring.servlet.multipart.max-file-size=1MB

# リクエストサイズの最大値
spring.servlet.multipart.max-request-size=10MB